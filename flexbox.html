<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            text-decoration: none;
            text-decoration-line: none;
            font-weight: 900;
            text-align: center;
            font-size: 50px;
        }
        .div1{
            display: flex;
            flex-direction: row;
            justify-content: none;
            row-gap: 10px;
            flex-wrap: wrap-reverse;
        }
        a:hover{
            text-decoration: underline;
            background-color: black;
            text-decoration-color: aqua;
            border-radius: 7px;
            padding: 10px;
        }

    </style>
</head>
<body>
    <div class="div1">
        <a href="">Tap</a>
        <a href="">Academy</a>
        <a href="">gives</a>
        <a href="">more</a>
        <a href="">skills</a>
    </div>
</body>
</html>
